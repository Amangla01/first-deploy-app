name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v.0.1.6
        with: 
          host: 13.201.8.42
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          scripts: |
            cd ~/deploy-app
            git pull origin main
            docket stop first-container || true
            docker rm first-container || true
            docker build -t first-app .
            docker run -d -p 3000:3000 --restart always --name first-container first-app
